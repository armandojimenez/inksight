# Development-only configuration. Credentials are for local dev — never use in production.
# Works on fresh clone with zero configuration: docker-compose up
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inksight
      POSTGRES_PASSWORD: inksight_dev
      POSTGRES_DB: inksight
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U inksight']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgres://inksight:inksight_dev@db:5432/inksight
      NODE_ENV: development
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
