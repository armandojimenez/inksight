<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Inksight — AI-powered visual assistant. Upload images and chat about what you see." />
    <meta name="theme-color" content="#0024CC" />
    <!-- Baseline CSP — backend Helmet CSP is stricter when served via NestJS -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' blob: data:; connect-src 'self' ws:; object-src 'none'; base-uri 'self'" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/png" href="/inksight-icon.png" sizes="250x250" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Fonts — Inkit family: Space Grotesk (headings), Archivo (body), Space Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <title>Inksight — AI Visual Assistant</title>
    <noscript>
      <style>
        /* Ensure content is visible when JavaScript is disabled */
        .opacity-0 { opacity: 1 !important; }
        .translate-y-6 { transform: none !important; }
      </style>
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
